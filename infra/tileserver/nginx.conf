user  nginx;
worker_processes  auto;
pid /run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  tiles  '$remote_addr $status "$request" '
                       '$body_bytes_sent rt=$request_time';
    access_log  /var/log/nginx/access.log tiles buffer=64k flush=5s;
    error_log   /var/log/nginx/error.log warn;

    server_tokens off;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types application/json application/x-protobuf image/svg+xml;

    map $http_origin $cors_origin {
        default "*";
    }

    limit_req_zone $binary_remote_addr zone=tiles:10m rate=50r/s;

    server {
        listen 80;
        server_name _;

        root /opt/tiles;

        location = /health {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        location /tiles/ {
            alias /opt/maps/tiles/;
            limit_req zone=tiles burst=100 nodelay;

            default_type application/octet-stream;

            add_header Cache-Control "public, max-age=300, must-revalidate" always;

            add_header Access-Control-Allow-Origin   $cors_origin always;
            add_header Access-Control-Allow-Methods  "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers  "Range, If-Match, If-None-Match" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range, ETag, Accept-Ranges" always;
            add_header Access-Control-Max-Age 86400 always;

            if ($request_method = OPTIONS) { return 204; }
        }

        location ~* \.json$ {
            add_header Cache-Control "public, max-age=300" always;
            add_header Access-Control-Allow-Origin $cors_origin always;
        }

        location /fonts/ {
            default_type application/x-protobuf;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header Access-Control-Allow-Origin $cors_origin always;
        }

        location /sprites/ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header Access-Control-Allow-Origin $cors_origin always;
        }

        location / { return 404; }
    }
}